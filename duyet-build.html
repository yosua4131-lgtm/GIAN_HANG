<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyệt Build - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        .build-section { padding: 28px 0; }

        .folder-add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 14px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            box-shadow: var(--shadow);
        }

        .folder-add-form input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--bg);
            transition: all 0.2s;
        }

        .folder-add-form input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .folder-section {
            margin-bottom: 16px;
        }

        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .folder-header:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow);
        }

        .folder-header h3 {
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-header .folder-count {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .folder-header .folder-actions {
            display: flex;
            gap: 6px;
        }

        .folder-header .folder-actions button {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .folder-header .folder-actions button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .folder-body {
            display: none;
            padding: 12px 0 0 0;
        }

        .folder-body.open {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .user-form {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            background: var(--card);
            padding: 14px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1.5px solid var(--border);
        }

        .user-form input {
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            flex: 1;
            min-width: 140px;
            background: var(--bg);
            font-family: inherit;
            transition: all 0.2s;
        }

        .user-form input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 13px 18px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 0.95rem;
            background: var(--card);
            box-shadow: var(--shadow);
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.2s;
        }

        .user-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--primary-light);
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .user-header h3 {
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .user-header h3:hover {
            color: var(--primary);
        }

        .user-actions button {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 6px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .user-actions button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .year-section {
            margin-top: 12px;
            padding: 16px;
            background: var(--bg);
            border-radius: 14px;
        }

        .year-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .year-header h4 {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .year-header h4::before { content: '📅'; }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        .month-btn {
            padding: 12px 8px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.25s;
        }

        .month-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .month-btn.checked {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-color: #28a745;
            color: #fff;
            box-shadow: 0 2px 8px rgba(40,167,69,0.3);
        }

        .month-btn.checked::after { content: ' ✓'; }

        .add-year-form {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .add-year-form input {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            width: 100px;
            font-size: 0.85rem;
            font-family: inherit;
            background: var(--card);
        }

        .add-year-form input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .add-year-form button {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: var(--gradient);
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .add-year-form button:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(230,57,70,0.25);
        }

        .user-detail { display: none; }
        .user-detail.open { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 32px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-card .num {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .month-images {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .month-img-thumb {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid var(--border);
            cursor: pointer;
        }

        .month-img-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .month-img-thumb .del-img {
            position: absolute;
            top: 1px;
            right: 1px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-detail {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-top: 8px;
        }

        .month-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .month-upload-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px dashed var(--border);
            background: var(--bg);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .month-upload-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .month-expanded { display: none; }
        .month-expanded.open { display: block; animation: fadeIn 0.3s ease; }

        .img-lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
        }

        .img-lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .no-folder-users {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px dashed var(--border);
        }

        .no-folder-users h3 {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📋 Duyệt Build</h1>
            <nav class="admin-nav">
                <a href="admin.html">Admin</a>
                <a href="index.html">Shop</a>
            </nav>
        </div>
    </header>

    <main class="container build-section">
        <div class="stats">
            <div class="stat-card">
                <div class="num" id="totalUsers">0</div>
                <div class="label">Người dùng</div>
            </div>
            <div class="stat-card">
                <div class="num" id="totalFolders">0</div>
                <div class="label">Folder</div>
            </div>
        </div>

        <!-- Add folder -->
        <div class="folder-add-form">
            <input type="text" id="newFolderName" placeholder="Tên folder mới...">
            <button class="btn-primary" onclick="addFolder()">+ Thêm folder</button>
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" id="searchUser" placeholder="🔍 Tìm người dùng..." oninput="renderAll()">
        </div>

        <!-- Content -->
        <div id="mainContent">
            <p class="loading">Đang tải...</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const db = firebase.firestore();
        const R2_URL = 'https://gian-hang-r2.yosua-4131.workers.dev';
        let allFolders = [];
        let allUsers = [];
        let openFolders = new Set();
        let openDetails = new Set();
        let openMonths = new Set();

        function compressImage(file, maxSize = 1200, quality = 0.8) {
            return new Promise((resolve) => {
                if (!file.type.startsWith('image/')) return resolve(file);
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                        else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', quality);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        async function uploadToR2(file, path) {
            const compressed = await compressImage(file);
            const res = await fetch(R2_URL + '/' + path, {
                method: 'PUT',
                body: compressed,
                headers: { 'Content-Type': 'image/jpeg' }
            });
            const data = await res.json();
            return data.url || (R2_URL + '/' + path);
        }

        // === FOLDERS ===
        async function loadFolders() {
            const snapshot = await db.collection('buildFolders').orderBy('name').get();
            allFolders = [];
            snapshot.forEach(doc => {
                allFolders.push({ id: doc.id, ...doc.data() });
            });
            document.getElementById('totalFolders').textContent = allFolders.length;
        }

        async function addFolder() {
            const input = document.getElementById('newFolderName');
            const name = input.value.trim();
            if (!name) return alert('Nhập tên folder!');
            const ref = await db.collection('buildFolders').add({
                name,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
            allFolders.push({ id: ref.id, name });
            document.getElementById('totalFolders').textContent = allFolders.length;
            openFolders.add(ref.id);
            renderAll();
        }

        async function renameFolder(id) {
            const folder = allFolders.find(f => f.id === id);
            const name = prompt('Đổi tên folder:', folder ? folder.name : '');
            if (!name || !name.trim()) return;
            await db.collection('buildFolders').doc(id).update({ name: name.trim() });
            folder.name = name.trim();
            renderAll();
        }

        async function deleteFolder(id) {
            if (!confirm('Xóa folder này? Người dùng bên trong sẽ chuyển ra ngoài.')) return;
            const users = allUsers.filter(u => u.folderId === id);
            const batch = db.batch();
            users.forEach(u => batch.update(db.collection('buildUsers').doc(u.id), { folderId: '' }));
            batch.delete(db.collection('buildFolders').doc(id));
            await batch.commit();
            allFolders = allFolders.filter(f => f.id !== id);
            users.forEach(u => u.folderId = '');
            document.getElementById('totalFolders').textContent = allFolders.length;
            renderAll();
        }

        function toggleFolder(id) {
            if (openFolders.has(id)) openFolders.delete(id);
            else openFolders.add(id);
            renderAll();
        }

        // === USERS ===
        async function loadUsers() {
            const snapshot = await db.collection('buildUsers').orderBy('name').get();
            allUsers = [];
            snapshot.forEach(doc => {
                allUsers.push({ id: doc.id, ...doc.data() });
            });
            document.getElementById('totalUsers').textContent = allUsers.length;
        }

        async function addUser(folderId) {
            const nameEl = document.getElementById('newUserName-' + folderId);
            const phoneEl = document.getElementById('newUserPhone-' + folderId);
            const name = nameEl.value.trim();
            const phone = phoneEl.value.trim();
            if (!name) return alert('Nhập tên!');

            const ref = await db.collection('buildUsers').add({
                name,
                phone,
                folderId: folderId || '',
                years: {},
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            nameEl.value = '';
            phoneEl.value = '';
            allUsers.push({ id: ref.id, name, phone, folderId: folderId || '', years: {} });
            document.getElementById('totalUsers').textContent = allUsers.length;
            if (folderId) openFolders.add(folderId);
            renderAll();
        }

        async function deleteUser(id) {
            if (!confirm('Xóa người dùng này?')) return;
            await db.collection('buildUsers').doc(id).delete();
            allUsers = allUsers.filter(u => u.id !== id);
            document.getElementById('totalUsers').textContent = allUsers.length;
            renderAll();
        }

        function toggleDetail(id) {
            if (openDetails.has(id)) openDetails.delete(id);
            else openDetails.add(id);
            renderAll();
        }

        function toggleMonthExpand(userId, year, month) {
            const key = userId + '-' + year + '-' + month;
            if (openMonths.has(key)) openMonths.delete(key);
            else openMonths.add(key);
            renderAll();
        }

        function getMonthData(user, year, month) {
            const val = user.years && user.years[year] && user.years[year][month];
            if (typeof val === 'object' && val !== null) return val;
            if (val === true) return { checked: true, images: [] };
            return { checked: false, images: [] };
        }

        // === RENDER ===
        function renderAll() {
            const query = document.getElementById('searchUser').value.toLowerCase();
            const container = document.getElementById('mainContent');
            let html = '';

            allFolders.forEach(folder => {
                let users = allUsers.filter(u => u.folderId === folder.id);
                if (query) users = users.filter(u => u.name.toLowerCase().includes(query) || (u.phone && u.phone.includes(query)));

                const isOpen = openFolders.has(folder.id);
                const totalInFolder = allUsers.filter(u => u.folderId === folder.id).length;

                html += '<div class="folder-section">';
                html += '<div class="folder-header" onclick="toggleFolder(\'' + folder.id + '\')">';
                html += '<h3>' + (isOpen ? '📂' : '📁') + ' ' + folder.name + ' <span class="folder-count">(' + totalInFolder + ' người)</span></h3>';
                html += '<div class="folder-actions">';
                html += '<button onclick="event.stopPropagation(); renameFolder(\'' + folder.id + '\')">Sửa tên</button>';
                html += '<button onclick="event.stopPropagation(); deleteFolder(\'' + folder.id + '\')">Xóa</button>';
                html += '</div></div>';

                html += '<div class="folder-body ' + (isOpen ? 'open' : '') + '">';
                html += '<div class="user-form">';
                html += '<input type="text" id="newUserName-' + folder.id + '" placeholder="Tên người dùng">';
                html += '<input type="text" id="newUserPhone-' + folder.id + '" placeholder="SĐT (tùy chọn)">';
                html += '<button class="btn-primary" onclick="addUser(\'' + folder.id + '\')">+ Thêm</button>';
                html += '</div>';

                if (users.length === 0) {
                    html += '<p style="padding:14px;color:var(--text-light);font-size:0.9rem">' + (query ? 'Không tìm thấy' : 'Chưa có người dùng') + '</p>';
                } else {
                    html += '<div class="user-list">';
                    users.forEach(u => { html += renderUserCard(u); });
                    html += '</div>';
                }
                html += '</div></div>';
            });

            let uncategorized = allUsers.filter(u => !u.folderId || !allFolders.find(f => f.id === u.folderId));
            if (query) uncategorized = uncategorized.filter(u => u.name.toLowerCase().includes(query) || (u.phone && u.phone.includes(query)));

            if (uncategorized.length > 0 || allFolders.length === 0) {
                html += '<div class="no-folder-users">';
                if (allFolders.length > 0) html += '<h3>📋 Chưa có folder</h3>';

                html += '<div class="user-form">';
                html += '<input type="text" id="newUserName-none" placeholder="Tên người dùng">';
                html += '<input type="text" id="newUserPhone-none" placeholder="SĐT (tùy chọn)">';
                html += '<button class="btn-primary" onclick="addUser(\'\')">+ Thêm</button>';
                html += '</div>';

                if (uncategorized.length === 0) {
                    html += '<p style="padding:14px;color:var(--text-light);font-size:0.9rem">Chưa có người dùng</p>';
                } else {
                    html += '<div class="user-list">';
                    uncategorized.forEach(u => { html += renderUserCard(u); });
                    html += '</div>';
                }
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function renderUserCard(u) {
            return '<div class="user-card">'
                + '<div class="user-header">'
                + '<h3 onclick="toggleDetail(\'' + u.id + '\')">' + u.name + (u.phone ? ' (' + u.phone + ')' : '') + '</h3>'
                + '<div class="user-actions"><button onclick="deleteUser(\'' + u.id + '\')">Xóa</button></div>'
                + '</div>'
                + '<div class="user-detail ' + (openDetails.has(u.id) ? 'open' : '') + '" id="detail-' + u.id + '">'
                + renderYears(u)
                + '<div class="add-year-form">'
                + '<input type="number" id="yearInput-' + u.id + '" placeholder="Năm" value="' + new Date().getFullYear() + '">'
                + '<button onclick="addYear(\'' + u.id + '\')">+ Thêm năm</button>'
                + '</div>'
                + '</div></div>';
        }

        function renderYears(user) {
            const years = user.years || {};
            const sortedYears = Object.keys(years).sort((a, b) => b - a);

            if (sortedYears.length === 0) return '<p style="font-size:0.85rem;color:var(--text-light)">Chưa có năm nào</p>';

            return sortedYears.map(year => {
                let h = '<div class="year-section">';
                h += '<div class="year-header"><h4>Năm ' + year + '</h4>';
                h += '<button class="btn-danger" onclick="deleteYear(\'' + user.id + '\', \'' + year + '\')" style="font-size:0.8rem;cursor:pointer">Xóa năm</button></div>';
                h += '<div class="months-grid">';
                for (let m = 1; m <= 12; m++) {
                    const md = getMonthData(user, year, m);
                    const imgCount = md.images ? md.images.length : 0;
                    h += '<div class="month-btn ' + (md.checked ? 'checked' : '') + '" onclick="toggleMonthExpand(\'' + user.id + '\', \'' + year + '\', ' + m + ')">';
                    h += 'T' + m + (imgCount > 0 ? ' (' + imgCount + '📷)' : '');
                    h += '</div>';
                }
                h += '</div>';

                for (let m = 1; m <= 12; m++) {
                    const md = getMonthData(user, year, m);
                    const key = user.id + '-' + year + '-' + m;
                    h += '<div class="month-expanded ' + (openMonths.has(key) ? 'open' : '') + '">';
                    h += '<div class="month-detail"><div class="month-detail-header">';
                    h += '<strong>Tháng ' + m + '/' + year + '</strong><div>';
                    h += '<button class="month-btn ' + (md.checked ? 'checked' : '') + '" style="padding:6px 12px;font-size:0.8rem" onclick="toggleMonth(\'' + user.id + '\', \'' + year + '\', ' + m + ')">';
                    h += (md.checked ? '✓ Đã duyệt' : 'Chưa duyệt') + '</button>';
                    h += '<label class="month-upload-btn">📷 Thêm ảnh<input type="file" accept="image/*" multiple style="display:none" onchange="uploadMonthImages(event, \'' + user.id + '\', \'' + year + '\', ' + m + ')"></label>';
                    h += '</div></div><div class="month-images">';
                    if (md.images && md.images.length > 0) {
                        md.images.forEach((img, idx) => {
                            h += '<div class="month-img-thumb"><img src="' + img + '" onclick="showLightbox(\'' + img + '\')"><button class="del-img" onclick="deleteMonthImage(\'' + user.id + '\', \'' + year + '\', ' + m + ', ' + idx + ')">×</button></div>';
                        });
                    } else {
                        h += '<span style="font-size:0.8rem;color:var(--text-light)">Chưa có ảnh</span>';
                    }
                    h += '</div></div></div>';
                }
                h += '</div>';
                return h;
            }).join('');
        }

        // === ACTIONS ===
        function showLightbox(src) {
            const lb = document.createElement('div');
            lb.className = 'img-lightbox';
            lb.innerHTML = '<img src="' + src + '">';
            lb.onclick = () => lb.remove();
            document.body.appendChild(lb);
        }

        async function uploadMonthImages(e, userId, year, month) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const user = allUsers.find(u => u.id === userId);
            const md = getMonthData(user, year, month);
            const currentImages = md.images || [];

            const localPreviews = files.map(f => URL.createObjectURL(f));
            localPreviews.forEach(p => currentImages.push(p));
            user.years[year][month] = { checked: md.checked, images: [...currentImages] };
            openMonths.add(userId + '-' + year + '-' + month);
            openDetails.add(userId);
            renderAll();

            const realUrls = [];
            for (const file of files) {
                const path = 'build/' + userId + '/' + year + '/' + month + '/' + Date.now() + '.jpg';
                const url = await uploadToR2(file, path);
                if (url) realUrls.push(url);
            }

            const savedImages = currentImages.filter(img => !img.startsWith('blob:'));
            savedImages.push(...realUrls);

            await db.collection('buildUsers').doc(userId).update({
                ['years.' + year + '.' + month]: { checked: md.checked, images: savedImages }
            });

            user.years[year][month] = { checked: md.checked, images: savedImages };
            openMonths.add(userId + '-' + year + '-' + month);
            openDetails.add(userId);
            renderAll();
            localPreviews.forEach(p => URL.revokeObjectURL(p));
        }

        async function deleteMonthImage(userId, year, month, imgIdx) {
            if (!confirm('Xóa ảnh này?')) return;
            const user = allUsers.find(u => u.id === userId);
            const md = getMonthData(user, year, month);
            md.images.splice(imgIdx, 1);

            await db.collection('buildUsers').doc(userId).update({
                ['years.' + year + '.' + month]: { checked: md.checked, images: md.images }
            });

            user.years[year][month] = md;
            openMonths.add(userId + '-' + year + '-' + month);
            openDetails.add(userId);
            renderAll();
        }

        async function addYear(userId) {
            const input = document.getElementById('yearInput-' + userId);
            if (!input) return;
            const year = input.value;
            if (!year) return;

            const months = {};
            for (let i = 1; i <= 12; i++) months[i] = { checked: false, images: [] };

            openDetails.add(userId);
            const user = allUsers.find(u => u.id === userId);
            if (user) {
                if (!user.years) user.years = {};
                user.years[year] = months;
                renderAll();
            }

            await db.collection('buildUsers').doc(userId).update({
                ['years.' + year]: months
            });
        }

        async function deleteYear(userId, year) {
            if (!confirm('Xóa năm ' + year + '?')) return;
            await db.collection('buildUsers').doc(userId).update({
                ['years.' + year]: firebase.firestore.FieldValue.delete()
            });
            const user = allUsers.find(u => u.id === userId);
            if (user && user.years) delete user.years[year];
            openDetails.add(userId);
            renderAll();
        }

        async function toggleMonth(userId, year, month) {
            const user = allUsers.find(u => u.id === userId);
            const md = getMonthData(user, year, month);
            md.checked = !md.checked;

            await db.collection('buildUsers').doc(userId).update({
                ['years.' + year + '.' + month]: md
            });

            user.years[year][month] = md;
            openMonths.add(userId + '-' + year + '-' + month);
            openDetails.add(userId);
            renderAll();
        }

        // Init
        async function init() {
            await Promise.all([loadFolders(), loadUsers()]);
            renderAll();
        }
        init();
    </script>
</body>
</html>
