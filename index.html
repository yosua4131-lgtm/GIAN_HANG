<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quán Bán Hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #ee4d2d;
            --orange-dark: #d73211;
            --orange-soft: #fff0ed;
            --orange-glow: rgba(238,77,45,0.15);
            --bg: #f5f5f5;
            --surface: #ffffff;
            --ink: #222;
            --ink-2: #555;
            --ink-3: #888;
            --line: #e8e8e8;
            --line-soft: #f0f0f0;
            --radius-s: 4px;
            --radius-m: 8px;
            --radius-l: 12px;
            --shadow-card: 0 1px 4px rgba(0,0,0,0.08);
            --shadow-lift: 0 4px 16px rgba(0,0,0,0.12);
            --shadow-modal: 0 -4px 32px rgba(0,0,0,0.15);
            --z-header: 100;
            --z-modal: 300;
            --z-toast: 400;
            --z-fly: 500;
            --transition: 180ms ease;
        }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* === HEADER === */
        .header {
            position: sticky;
            top: 0;
            z-index: var(--z-header);
            background: linear-gradient(135deg, #f53d2d 0%, #f63 100%);
            padding: 0 20px;
            height: 54px;
            display: flex;
            align-items: center;
        }
        .header-inner {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.02em;
            cursor: default;
            user-select: none;
        }
        .logo span { color: #fff; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-admin {
            display: none;
            padding: 6px 14px;
            border-radius: var(--radius-s);
            background: rgba(255,255,255,0.2);
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all var(--transition);
        }
        .btn-admin:hover { background: rgba(255,255,255,0.3); }
        .cart-btn {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-s);
            transition: background var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-btn:hover { background: rgba(255,255,255,0.15); }
        .cart-btn svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .cart-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            border-radius: 8px;
            background: var(--orange);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .cart-badge.show { opacity: 1; transform: scale(1); }
        .cart-btn.bounce { animation: cartPop 350ms ease; }
        @keyframes cartPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* === MAIN === */
        .main { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

        /* === HERO BANNER === */
        .hero {
            background: linear-gradient(135deg, #f53d2d 0%, #ff6633 50%, #ffa726 100%);
            padding: 24px 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .hero-text h2 {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        .hero-text p {
            font-size: 0.85rem;
            opacity: 0.9;
            font-weight: 500;
        }
        .hero-emoji {
            font-size: 3rem;
            flex-shrink: 0;
        }
        .hero::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        @media (max-width: 768px) {
            .hero { padding: 18px 16px; }
            .hero-text h2 { font-size: 1.1rem; }
            .hero-text p { font-size: 0.78rem; }
            .hero-emoji { font-size: 2.2rem; }
        }

        /* === MENU === */
        .cat-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 16px;
            margin: 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: sticky;
            top: 54px;
            z-index: 99;
            background: var(--bg);
            border-bottom: 1px solid var(--line);
        }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-nav-btn {
            flex-shrink: 0;
            padding: 9px 20px;
            border-radius: 24px;
            border: none;
            background: var(--surface);
            color: var(--ink);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }
        .cat-nav-btn.active {
            background: var(--orange);
            color: #fff;
            box-shadow: 0 2px 8px rgba(238,77,45,.35);
        }
        .menu-section { padding: 16px 0 40px; }
        .menu-heading {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 14px;
            color: var(--orange);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .menu-heading::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--orange);
            border-radius: 2px;
        }
        .cat-label {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0;
            color: var(--ink);
            margin: 20px 0 10px;
            padding: 8px 12px;
            background: var(--surface);
            border-radius: var(--radius-s);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cat-label::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--orange);
            border-radius: 2px;
        }
        .cat-label:first-child { margin-top: 0; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        /* === CARD === */
        .card {
            background: var(--surface);
            border-radius: var(--radius-s);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: box-shadow 250ms ease, transform 250ms ease;
            position: relative;
        }
        .card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--orange);
            transform: scaleX(0);
            transition: transform 250ms ease;
        }
        .card:hover::after { transform: scaleX(1); }
        .card-img {
            aspect-ratio: 1;
            background-size: cover;
            background-position: center;
            background-color: #f0f0f0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--ink-3);
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 400ms ease;
        }
        .card:hover .card-img img { transform: scale(1.05); }
        .card-img-count {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .card-body { padding: 8px 10px 10px; }
        .card-name {
            font-size: 0.78rem;
            font-weight: 500;
            line-height: 1.35;
            margin-bottom: 6px;
            color: var(--ink);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.1em;
        }
        .card-desc {
            display: none;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-price {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--orange);
        }
        .card-price::before {
            content: '\20AB';
            font-size: 0.65rem;
            vertical-align: top;
            margin-right: 1px;
        }
        .btn-add {
            background: transparent;
            color: var(--orange);
            border: 1px solid var(--orange);
            padding: 4px 10px;
            border-radius: var(--radius-s);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.65rem;
            font-family: inherit;
            transition: all var(--transition);
        }
        .btn-add:hover { background: var(--orange); color: #fff; }
        .btn-add:active { transform: scale(0.96); }

        /* === PRODUCT MODAL === */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: var(--z-modal);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: overlayIn 200ms ease;
        }
        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
        .pm-sheet {
            background: var(--bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 88vh;
            overflow-y: auto;
            animation: sheetUp 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes sheetUp {
            from { transform: translateY(40px); opacity: 0.5; }
            to { transform: translateY(0); opacity: 1; }
        }
        .pm-img-wrap {
            position: relative;
            height: 300px;
            background: var(--surface);
            overflow: hidden;
        }
        .pm-img-track {
            display: flex;
            height: 100%;
            transition: transform 300ms ease;
        }
        .pm-img-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .pm-img-empty {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--ink-3);
        }
        .pm-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: background var(--transition);
        }
        .pm-close:hover { background: rgba(0,0,0,0.6); }
        .pm-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            z-index: 2;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            transition: all var(--transition);
        }
        .pm-nav:hover { background: #fff; transform: translateY(-50%) scale(1.05); }
        .pm-nav.prev { left: 10px; }
        .pm-nav.next { right: 10px; }
        .pm-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        .pm-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.4);
            border: none;
            cursor: pointer;
            transition: all 200ms ease;
        }
        .pm-dot.active { background: #fff; width: 16px; }
        .pm-count {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            padding: 3px 9px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
        }
        .pm-body { padding: 20px 20px 28px; }
        .pm-name {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 6px;
        }
        .pm-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--orange);
            margin-bottom: 14px;
        }
        .pm-desc {
            font-size: 0.88rem;
            color: var(--ink-2);
            line-height: 1.65;
            margin-bottom: 20px;
        }
        .pm-add {
            width: 100%;
            background: var(--orange);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: var(--radius-m);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
        }
        .pm-add:hover { background: var(--orange-dark); }
        .pm-add:active { transform: scale(0.98); }

        /* === CART MODAL === */
        .cart-sheet {
            background: var(--bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 24px 20px 28px;
            animation: sheetUp 300ms cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-modal);
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 16px;
        }
        .cart-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .cart-close {
            background: var(--surface);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--ink-2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .cart-close:hover { background: var(--line); color: var(--ink); }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--line-soft);
        }
        .cart-item-name {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .cart-qty {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cart-qty button {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: var(--bg);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-family: inherit;
        }
        .cart-qty button:hover { border-color: var(--ink-3); }
        .cart-qty span {
            font-weight: 700;
            min-width: 20px;
            text-align: center;
            font-size: 0.88rem;
        }
        .cart-item-price {
            font-weight: 700;
            min-width: 70px;
            text-align: right;
            font-size: 0.88rem;
            color: var(--ink);
        }
        .cart-item-del {
            background: none;
            border: none;
            color: var(--ink-3);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            transition: color var(--transition);
        }
        .cart-item-del:hover { color: var(--orange); }
        .cart-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            font-size: 1rem;
        }
        .cart-summary strong {
            font-size: 1.15rem;
            font-weight: 800;
        }
        .cart-form input, .cart-form textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius-s);
            margin-bottom: 8px;
            font-family: inherit;
            font-size: 0.88rem;
            background: var(--bg);
            transition: border-color var(--transition);
            color: var(--ink);
        }
        .cart-form input:focus, .cart-form textarea:focus {
            outline: none;
            border-color: var(--ink-3);
        }
        .cart-form textarea { resize: none; height: 56px; }
        .cart-form input::placeholder, .cart-form textarea::placeholder { color: var(--ink-3); }
        .btn-submit {
            width: 100%;
            background: var(--orange);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: var(--radius-m);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
            transition: background var(--transition);
        }
        .btn-submit:hover { background: var(--orange-dark); }

        /* === PAYMENT === */
        .pay-methods { display: flex; gap: 8px; margin-bottom: 10px; }
        .pay-opt {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--line);
            border-radius: var(--radius-s);
            text-align: center;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            background: var(--surface);
            transition: all var(--transition);
        }
        .pay-opt.active {
            border-color: var(--orange);
            background: var(--orange-soft);
            color: var(--orange);
        }
        .pay-opt span { display: block; font-size: 1.2rem; margin-bottom: 4px; }
        .qr-box {
            text-align: center;
            padding: 16px;
            background: var(--surface);
            border-radius: var(--radius-m);
            margin-bottom: 10px;
            border: 1px dashed var(--orange);
        }
        .qr-box img {
            max-width: 220px;
            width: 100%;
            border-radius: var(--radius-s);
            margin-bottom: 10px;
        }
        .qr-box p { font-size: 0.78rem; color: var(--ink-2); margin-bottom: 10px; }
        .btn-confirmed {
            width: 100%;
            padding: 12px;
            border: 2px solid #2ecc71;
            background: #f0fff5;
            color: #27ae60;
            border-radius: var(--radius-s);
            font-size: 0.88rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-confirmed:hover { background: #2ecc71; color: #fff; }
        .btn-confirmed.done {
            background: #2ecc71;
            color: #fff;
            pointer-events: none;
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            top: 68px;
            right: 20px;
            background: var(--ink);
            color: #fff;
            padding: 10px 16px;
            border-radius: var(--radius-s);
            font-size: 0.82rem;
            font-weight: 600;
            z-index: var(--z-toast);
            transform: translateX(calc(100% + 24px));
            transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.show { transform: translateX(0); }

        /* === FLY === */
        .fly-dot {
            position: fixed;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--orange);
            z-index: var(--z-fly);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(214,48,49,0.35);
            transition: left 1s cubic-bezier(0.5, 0, 0.3, 1),
                        top 1s cubic-bezier(0.2, -0.2, 0.3, 1),
                        transform 1s ease-in,
                        opacity 0.3s ease 0.7s;
        }
        .fly-dot.go { transform: scale(0.2); opacity: 0; }

        /* === EMPTY === */
        .empty {
            text-align: center;
            color: var(--ink-3);
            padding: 48px 20px;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }

        /* === FOOTER === */
        .footer {
            text-align: center;
            padding: 24px 20px;
            color: #999;
            font-size: 0.72rem;
            background: var(--surface);
            margin-top: 20px;
            border-top: 1px solid var(--line);
        }

        /* === REDUCED MOTION === */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .card-body { padding: 6px 8px 8px; }
            .card-name { font-size: 0.72rem; min-height: 1.9em; }
            .card-price { font-size: 0.78rem; }
            .btn-add { padding: 3px 8px; font-size: 0.6rem; }
            .menu-heading { font-size: 0.88rem; }
            .pm-img-wrap { height: 240px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo" id="logoBtn">Quán <span>Bán Hàng</span></div>
        <div class="header-actions">
            <a href="admin.html" class="btn-admin" id="adminBtn">Admin</a>
            <button class="cart-btn" id="cartBtn" onclick="openCart()">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </div>
</header>

<div class="hero">
    <div class="hero-inner">
        <div class="hero-text">
            <h2>Giao hàng tận nơi</h2>
            <p>Order ngay - Nhận liền tay</p>
        </div>
        <div class="hero-emoji">🛵</div>
    </div>
</div>

<div class="cat-nav" id="catNav"></div>
<main class="main">
    <section class="menu-section">
        <h1 class="menu-heading">Menu</h1>
        <div id="menuGrid"><p class="empty">Đang tải...</p></div>
    </section>
</main>

<div class="footer">&copy; 2026 Quán Bán Hàng</div>

<div class="toast" id="toast"></div>
<div id="productModal" class="overlay hidden"></div>
<div id="cartModal" class="overlay hidden"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
    const db = firebase.firestore();
    let cart = [];
    let allProducts = [];
    let allCategories = [];
    let allAddresses = [];
    let qrUrl = '';
    let pmSlide = 0;

    // === MENU ===
    async function loadMenu() {
        const grid = document.getElementById('menuGrid');
        const [catSnap, prodSnap, addrSnap, payDoc] = await Promise.all([
            db.collection('categories').orderBy('order').get(),
            db.collection('products').where('active', '==', true).get(),
            db.collection('addresses').orderBy('order').get(),
            db.collection('settings').doc('payment').get()
        ]);
        qrUrl = (payDoc.exists && payDoc.data().qrUrl) ? payDoc.data().qrUrl : '';

        allCategories = [];
        catSnap.forEach(doc => allCategories.push({ id: doc.id, ...doc.data() }));
        allProducts = [];
        prodSnap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        allAddresses = [];
        addrSnap.forEach(doc => allAddresses.push({ id: doc.id, ...doc.data() }));

        if (allProducts.length === 0) {
            grid.innerHTML = '<p class="empty">Chưa có món nào</p>';
            return;
        }

        let html = '';
        let navHtml = '';
        if (allCategories.length > 0) {
            allCategories.forEach(cat => {
                const prods = allProducts.filter(p => p.categoryId === cat.id);
                if (prods.length === 0) return;
                navHtml += '<button class="cat-nav-btn" onclick="scrollToCat(\'' + cat.id + '\')">' + cat.name + '</button>';
                html += '<div class="cat-label" id="cat-' + cat.id + '">' + cat.name + '</div><div class="menu-grid">';
                prods.forEach(item => { html += cardHTML(item); });
                html += '</div>';
            });
            const rest = allProducts.filter(p => !p.categoryId || !allCategories.find(c => c.id === p.categoryId));
            if (rest.length > 0) {
                navHtml += '<button class="cat-nav-btn" onclick="scrollToCat(\'other\')">Khác</button>';
                html += '<div class="cat-label" id="cat-other">Khác</div><div class="menu-grid">';
                rest.forEach(item => { html += cardHTML(item); });
                html += '</div>';
            }
        } else {
            html += '<div class="menu-grid">';
            allProducts.forEach(item => { html += cardHTML(item); });
            html += '</div>';
        }
        document.getElementById('catNav').innerHTML = navHtml;
        grid.innerHTML = html;
    }

    function scrollToCat(id) {
        const el = document.getElementById('cat-' + id);
        if (!el) return;
        const offset = 120;
        window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
        document.querySelectorAll('.cat-nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.cat-nav-btn').forEach(b => {
            if (b.getAttribute('onclick').includes(id)) b.classList.add('active');
        });
    }
    window.addEventListener('scroll', function() {
        const labels = document.querySelectorAll('.cat-label[id]');
        const btns = document.querySelectorAll('.cat-nav-btn');
        if (!labels.length) return;
        let activeIdx = 0;
        labels.forEach((el, i) => {
            if (window.scrollY + 140 >= el.offsetTop) activeIdx = i;
        });
        btns.forEach((b, i) => b.classList.toggle('active', i === activeIdx));
    });

    function cardHTML(item) {
        const img = (item.images && item.images[0]) || item.image || '';
        const cnt = item.images ? item.images.length : (item.image ? 1 : 0);
        return '<div class="card" onclick="openProduct(\'' + item.id + '\')">'
            + '<div class="card-img">'
            + (img ? '<img src="' + img + '" alt="' + item.name + '" loading="lazy">' : '🍽️')
            + (cnt > 1 ? '<span class="card-img-count">+' + (cnt-1) + '</span>' : '')
            + '</div><div class="card-body">'
            + '<div class="card-name">' + item.name + '</div>'
            + (item.description ? '<div class="card-desc">' + item.description + '</div>' : '')
            + '<div class="card-footer"><span class="card-price">' + fmtPrice(item.price) + '</span>'
            + '<button class="btn-add" onclick="event.stopPropagation();addToCart(\'' + item.id + '\',\'' + item.name.replace(/'/g,"\\'") + '\',' + item.price + ',event)">Thêm</button>'
            + '</div></div></div>';
    }

    // === PRODUCT DETAIL ===
    function openProduct(id) {
        const item = allProducts.find(p => p.id === id);
        if (!item) return;
        pmSlide = 0;
        const imgs = item.images || (item.image ? [item.image] : []);
        const m = document.getElementById('productModal');
        m.innerHTML = '<div class="pm-sheet">'
            + '<div class="pm-img-wrap">'
            + '<button class="pm-close" onclick="closePM()">&times;</button>'
            + (imgs.length > 1 ? '<span class="pm-count">' + imgs.length + ' anh</span>' : '')
            + (imgs.length > 0
                ? '<div class="pm-img-track" id="pmTrack">' + imgs.map(i => '<img src="' + i + '">').join('') + '</div>'
                  + (imgs.length > 1
                    ? '<button class="pm-nav prev" onclick="pmNav(-1)">&#8249;</button><button class="pm-nav next" onclick="pmNav(1)">&#8250;</button>'
                      + '<div class="pm-dots">' + imgs.map((_,i) => '<button class="pm-dot' + (i===0?' active':'') + '" onclick="pmGo('+i+')"></button>').join('') + '</div>'
                    : '')
                : '<div class="pm-img-empty">🍽️</div>')
            + '</div><div class="pm-body">'
            + '<div class="pm-name">' + item.name + '</div>'
            + '<div class="pm-price">' + fmtPrice(item.price) + '</div>'
            + (item.description ? '<div class="pm-desc">' + item.description + '</div>' : '')
            + '<button class="pm-add" onclick="addToCart(\'' + item.id + '\',\'' + item.name.replace(/'/g,"\\'") + '\',' + item.price + ',event);closePM()">Thêm vào giỏ hàng</button>'
            + '</div></div>';
        m.classList.remove('hidden');
        m.onclick = function(e) { if (e.target === m) closePM(); };
    }
    function closePM() { document.getElementById('productModal').classList.add('hidden'); }
    function pmNav(d) {
        const t = document.getElementById('pmTrack'); if (!t) return;
        pmSlide = Math.max(0, Math.min(t.children.length - 1, pmSlide + d));
        t.style.transform = 'translateX(-' + (pmSlide*100) + '%)';
        document.querySelectorAll('.pm-dot').forEach((dot,i) => dot.classList.toggle('active', i===pmSlide));
    }
    function pmGo(i) { pmSlide = i; pmNav(0); }

    // === CART ===
    function addToCart(id, name, price, e) {
        const ex = cart.find(c => c.id === id);
        if (ex) ex.qty++; else cart.push({id, name, price, qty:1});
        updateCart();
        showToast(name);
        flyToCart(e);
    }
    function removeFromCart(id) { cart = cart.filter(c => c.id !== id); updateCart(); }
    function changeQty(id, d) {
        const item = cart.find(c => c.id === id);
        if (!item) return;
        item.qty += d;
        if (item.qty <= 0) {
            cart = cart.filter(c => c.id !== id);
            updateCart();
            return;
        }
        const qtyEl = document.getElementById('qty-' + id);
        const priceEl = document.getElementById('price-' + id);
        if (qtyEl) qtyEl.textContent = item.qty;
        if (priceEl) priceEl.textContent = fmtPrice(item.price * item.qty);
        const total = cart.reduce((s,c) => s+c.price*c.qty, 0);
        const totalEl = document.getElementById('cartTotal');
        if (totalEl) totalEl.textContent = fmtPrice(total);
        updateBadge();
    }
    function updateBadge() {
        const count = cart.reduce((s,c) => s+c.qty, 0);
        const badge = document.getElementById('cartBadge');
        badge.textContent = count;
        badge.classList.toggle('show', count > 0);
    }
    function updateCart() {
        updateBadge();
        const cm = document.getElementById('cartModal');
        if (cm.classList.contains('hidden')) return;
        renderCartContent();
    }
    function openCart() {
        const m = document.getElementById('cartModal');
        renderCartContent();
        m.classList.remove('hidden');
        m.onclick = function(e) { if (e.target === m) closeCart(); };
    }
    function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }

    function renderCartContent() {
        const total = cart.reduce((s,c) => s+c.price*c.qty, 0);
        const m = document.getElementById('cartModal');
        let h = '<div class="cart-sheet"><div class="cart-header"><h3>Giỏ hàng</h3><button class="cart-close" onclick="closeCart()">&times;</button></div>';
        if (cart.length === 0) {
            h += '<p class="empty">Chưa có món nào</p>';
        } else {
            cart.forEach(c => {
                h += '<div class="cart-item"><span class="cart-item-name">' + c.name + '</span>'
                    + '<div class="cart-qty"><button onclick="changeQty(\'' + c.id + '\',-1)">-</button><span id="qty-' + c.id + '">' + c.qty + '</span><button onclick="changeQty(\'' + c.id + '\',1)">+</button></div>'
                    + '<span class="cart-item-price" id="price-' + c.id + '">' + fmtPrice(c.price*c.qty) + '</span>'
                    + '<button class="cart-item-del" onclick="removeFromCart(\'' + c.id + '\')">&times;</button></div>';
            });
            h += '<div class="cart-summary"><span>Tổng cộng</span><strong id="cartTotal">' + fmtPrice(total) + '</strong></div>';
        }
        let addrOpts = '<option value="">-- Chọn địa chỉ --</option>';
        allAddresses.forEach(a => { addrOpts += '<option value="' + a.name.replace(/"/g, '&quot;') + '">' + a.name + '</option>'; });
        addrOpts += '<option value="__custom">Nhập địa chỉ khác...</option>';

        h += '<form class="cart-form" onsubmit="submitOrder(event)">'
            + '<input type="text" id="customerName" placeholder="Tên của bạn" required>'
            + '<input type="text" id="customerPhone" placeholder="Số điện thoại (tùy chọn)">'
            + '<select id="customerAddrSelect" onchange="toggleCustomAddr()" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--radius-s);font-family:inherit;font-size:0.88rem;background:var(--surface);margin-bottom:8px">' + addrOpts + '</select>'
            + '<input type="text" id="customerAddrCustom" placeholder="Nhập địa chỉ của bạn..." style="display:none">'
            + '<div class="pay-methods">'
            + '<div class="pay-opt active" onclick="selectPay(\'cash\',this)"><span>💵</span>Tiền mặt</div>'
            + '<div class="pay-opt" onclick="selectPay(\'transfer\',this)"><span>📱</span>Chuyển khoản</div>'
            + '</div>'
            + '<input type="hidden" id="payMethod" value="cash">'
            + '<div id="qrSection" style="display:none"></div>'
            + '<textarea id="customerNote" placeholder="Ghi chú..."></textarea>'
            + '<button type="submit" class="btn-submit" id="submitBtn">Đặt hàng</button></form></div>';
        m.innerHTML = h;
    }

    // === FLY ANIMATION ===
    function flyToCart(e) {
        const cartEl = document.getElementById('cartBtn');
        const cartRect = cartEl.getBoundingClientRect();
        let sx, sy;
        if (e && e.target) {
            const r = e.target.getBoundingClientRect();
            sx = r.left + r.width/2 - 18;
            sy = r.top + r.height/2 - 18;
        } else {
            sx = window.innerWidth/2 - 18;
            sy = window.innerHeight/2;
        }
        const fly = document.createElement('div');
        fly.className = 'fly-dot';
        fly.textContent = '+';
        fly.style.left = sx + 'px';
        fly.style.top = sy + 'px';
        document.body.appendChild(fly);
        requestAnimationFrame(() => {
            fly.style.left = (cartRect.left + cartRect.width/2 - 18) + 'px';
            fly.style.top = (cartRect.top + cartRect.height/2 - 18) + 'px';
            fly.classList.add('go');
        });
        setTimeout(() => {
            fly.remove();
            cartEl.classList.remove('bounce');
            void cartEl.offsetWidth;
            cartEl.classList.add('bounce');
        }, 1000);
    }

    // === TOAST ===
    let toastT;
    function showToast(name) {
        const t = document.getElementById('toast');
        t.textContent = 'Da them ' + name;
        t.classList.add('show');
        clearTimeout(toastT);
        toastT = setTimeout(() => t.classList.remove('show'), 2000);
    }

    let transferConfirmed = false;

    function selectPay(method, el) {
        document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('payMethod').value = method;
        transferConfirmed = false;
        const qrSec = document.getElementById('qrSection');
        const btn = document.getElementById('submitBtn');
        if (method === 'transfer') {
            if (qrUrl) {
                qrSec.style.display = 'block';
                qrSec.innerHTML = '<div class="qr-box">'
                    + '<p>Quét mã QR để chuyển khoản</p>'
                    + '<img src="' + qrUrl + '" alt="QR">'
                    + '<button type="button" class="btn-confirmed" id="confirmTransferBtn" onclick="confirmTransfer()">Đã chuyển khoản</button>'
                    + '</div>';
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.textContent = 'Vui lòng xác nhận chuyển khoản';
            } else {
                qrSec.style.display = 'block';
                qrSec.innerHTML = '<div class="qr-box"><p>Chưa có mã QR. Liên hệ shop để chuyển khoản.</p></div>';
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.textContent = 'Đặt hàng';
            }
        } else {
            qrSec.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.textContent = 'Đặt hàng';
        }
    }

    function confirmTransfer() {
        transferConfirmed = true;
        const cb = document.getElementById('confirmTransferBtn');
        cb.textContent = '✓ Đã xác nhận chuyển khoản';
        cb.classList.add('done');
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = 'Đặt hàng';
    }

    function toggleCustomAddr() {
        const sel = document.getElementById('customerAddrSelect');
        const custom = document.getElementById('customerAddrCustom');
        if (sel.value === '__custom') {
            custom.style.display = 'block';
            custom.focus();
        } else {
            custom.style.display = 'none';
            custom.value = '';
        }
    }

    // === ORDER ===
    async function submitOrder(e) {
        e.preventDefault();
        if (cart.length === 0) return;
        const addrSel = document.getElementById('customerAddrSelect').value;
        const addrCustom = document.getElementById('customerAddrCustom').value.trim();
        const address = addrSel === '__custom' ? addrCustom : addrSel;
        const payMethod = document.getElementById('payMethod').value;
        const order = {
            customer: document.getElementById('customerName').value.trim(),
            phone: document.getElementById('customerPhone').value.trim(),
            address: address,
            payMethod: payMethod,
            transferConfirmed: payMethod === 'transfer' ? transferConfirmed : null,
            note: document.getElementById('customerNote').value.trim(),
            items: cart.map(c => ({id:c.id, name:c.name, price:c.price, qty:c.qty})),
            total: cart.reduce((s,c) => s+c.price*c.qty, 0),
            status: 'pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection('orders').add(order);
        await db.collection('notifications').add({
            type: 'new_order',
            message: 'Đơn mới từ ' + order.customer + ' - ' + fmtPrice(order.total),
            read: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        cart = [];
        updateCart();
        closeCart();
        showToast('Đặt hàng thành công!');
    }

    function fmtPrice(n) { return n.toLocaleString('vi-VN'); }

    // === SECRET ADMIN ===
    let ltaps = 0, ltimer;
    document.getElementById('logoBtn').addEventListener('click', function() {
        ltaps++;
        clearTimeout(ltimer);
        ltimer = setTimeout(() => ltaps = 0, 2000);
        if (ltaps >= 5) {
            const b = document.getElementById('adminBtn');
            b.style.display = b.style.display === 'inline-block' ? 'none' : 'inline-block';
            ltaps = 0;
        }
    });

    loadMenu();
</script>
</body>
</html>
