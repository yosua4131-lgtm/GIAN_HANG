<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quán Bán Hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 400;
            animation: fadeIn 0.2s ease;
        }
        .product-modal .pm-content {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUpModal 0.3s ease;
        }
        .pm-gallery {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: #f5f0ec;
        }
        .pm-gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease;
        }
        .pm-gallery-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .pm-gallery-empty {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .pm-gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.85);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 2;
            transition: all 0.2s;
        }
        .pm-gallery-nav:hover {
            background: #fff;
            transform: translateY(-50%) scale(1.1);
        }
        .pm-gallery-nav.prev { left: 10px; }
        .pm-gallery-nav.next { right: 10px; }
        .pm-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }
        .pm-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pm-dot.active {
            background: #fff;
            transform: scale(1.3);
        }
        .pm-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.45);
            color: #fff;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 3;
            transition: background 0.2s;
        }
        .pm-close:hover { background: rgba(0,0,0,0.7); }
        .pm-body {
            padding: 22px 20px 28px;
        }
        .pm-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .pm-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 14px;
        }
        .pm-desc {
            font-size: 0.92rem;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 22px;
        }
        .pm-add-btn {
            width: 100%;
            background: var(--gradient);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230,57,70,0.3);
            transition: all 0.2s;
        }
        .pm-add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230,57,70,0.4);
        }
        .pm-img-count {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 2;
        }
        .cat-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 28px 0 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-title:first-child { margin-top: 0; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🍜 Quán Bán Hàng</h1>
            <nav>
                <a href="admin.html" class="btn-admin">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="menu-section">
            <h2>Menu</h2>
            <div id="menuGrid">
                <p class="loading">Đang tải menu...</p>
            </div>
        </section>

        <div id="cartFloat" class="cart-float hidden">
            <span id="cartCount">0</span> món — <span id="cartTotal">0đ</span>
            <button onclick="openCart()">Xem giỏ</button>
        </div>

        <div id="cartModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🛒 Giỏ hàng</h3>
                    <button class="close-btn" onclick="closeCart()">&times;</button>
                </div>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-footer">
                    <div class="cart-total">Tổng: <strong id="cartTotalModal">0đ</strong></div>
                    <form id="orderForm" onsubmit="submitOrder(event)">
                        <input type="text" id="customerName" placeholder="Tên bạn" required>
                        <input type="text" id="customerPhone" placeholder="SĐT (tùy chọn)">
                        <textarea id="customerNote" placeholder="Ghi chú (ít đá, nhiều đường...)"></textarea>
                        <button type="submit" class="btn-order">Đặt hàng</button>
                    </form>
                </div>
            </div>
        </div>
        <div id="productModal" class="product-modal hidden"></div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const db = firebase.firestore();
        let cart = [];
        let allProducts = [];
        let allCategories = [];
        let pmSlide = 0;

        async function loadMenu() {
            const grid = document.getElementById('menuGrid');

            const [catSnap, prodSnap] = await Promise.all([
                db.collection('categories').orderBy('order').get(),
                db.collection('products').where('active', '==', true).get()
            ]);

            allCategories = [];
            catSnap.forEach(doc => allCategories.push({ id: doc.id, ...doc.data() }));

            allProducts = [];
            prodSnap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));

            if (allProducts.length === 0) {
                grid.innerHTML = '<p class="empty">Chưa có món nào trong menu</p>';
                return;
            }

            let html = '';

            if (allCategories.length > 0) {
                allCategories.forEach(cat => {
                    const prods = allProducts.filter(p => p.categoryId === cat.id);
                    if (prods.length === 0) return;
                    html += '<div class="cat-title">🔥 ' + cat.name + '</div>';
                    html += '<div class="menu-grid">';
                    prods.forEach(item => { html += renderMenuItem(item); });
                    html += '</div>';
                });

                const uncategorized = allProducts.filter(p => !p.categoryId || !allCategories.find(c => c.id === p.categoryId));
                if (uncategorized.length > 0) {
                    if (allCategories.length > 0) html += '<div class="cat-title">📋 Khác</div>';
                    html += '<div class="menu-grid">';
                    uncategorized.forEach(item => { html += renderMenuItem(item); });
                    html += '</div>';
                }
            } else {
                html += '<div class="menu-grid">';
                allProducts.forEach(item => { html += renderMenuItem(item); });
                html += '</div>';
            }

            grid.innerHTML = html;
        }

        function renderMenuItem(item) {
            const mainImg = (item.images && item.images[0]) || item.image || '';
            const imgCount = item.images ? item.images.length : (item.image ? 1 : 0);
            return `
                <div class="menu-item" onclick="openProduct('${item.id}')" style="cursor:pointer">
                    <div class="item-img" style="background-image: url('${mainImg}')">
                        ${!mainImg ? '🍽️' : ''}
                        ${imgCount > 1 ? '<span style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;padding:2px 8px;border-radius:12px;font-size:0.75rem">+' + (imgCount-1) + ' ảnh</span>' : ''}
                    </div>
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p class="item-desc">${item.description || ''}</p>
                        <div class="item-bottom">
                            <span class="item-price">${formatPrice(item.price)}</span>
                            <button class="btn-add" onclick="event.stopPropagation(); addToCart('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price})">+ Thêm</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function openProduct(id) {
            const item = allProducts.find(p => p.id === id);
            if (!item) return;
            pmSlide = 0;
            const images = item.images || (item.image ? [item.image] : []);
            const modal = document.getElementById('productModal');
            modal.innerHTML = `
                <div class="pm-content">
                    <div class="pm-gallery">
                        <button class="pm-close" onclick="closeProduct()">&times;</button>
                        ${images.length > 1 ? '<span class="pm-img-count">' + images.length + ' ảnh</span>' : ''}
                        ${images.length > 0 ? `
                            <div class="pm-gallery-track" id="pmTrack">
                                ${images.map(img => '<img src="' + img + '">').join('')}
                            </div>
                            ${images.length > 1 ? `
                                <button class="pm-gallery-nav prev" onclick="pmNav(-1)">‹</button>
                                <button class="pm-gallery-nav next" onclick="pmNav(1)">›</button>
                                <div class="pm-dots">${images.map((_, i) => '<button class="pm-dot' + (i === 0 ? ' active' : '') + '" onclick="pmGo(' + i + ')"></button>').join('')}</div>
                            ` : ''}
                        ` : '<div class="pm-gallery-empty">🍽️</div>'}
                    </div>
                    <div class="pm-body">
                        <div class="pm-name">${item.name}</div>
                        <div class="pm-price">${formatPrice(item.price)}</div>
                        ${item.description ? '<div class="pm-desc">' + item.description + '</div>' : ''}
                        <button class="pm-add-btn" onclick="addToCart('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price}); closeProduct()">🛒 Thêm vào giỏ hàng</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            modal.onclick = function(e) { if (e.target === modal) closeProduct(); };
        }

        function closeProduct() {
            document.getElementById('productModal').classList.add('hidden');
        }

        function pmNav(dir) {
            const track = document.getElementById('pmTrack');
            if (!track) return;
            const count = track.children.length;
            pmSlide = Math.max(0, Math.min(count - 1, pmSlide + dir));
            track.style.transform = 'translateX(-' + (pmSlide * 100) + '%)';
            document.querySelectorAll('.pm-dot').forEach((d, i) => d.classList.toggle('active', i === pmSlide));
        }

        function pmGo(i) {
            pmSlide = i;
            const track = document.getElementById('pmTrack');
            if (!track) return;
            track.style.transform = 'translateX(-' + (pmSlide * 100) + '%)';
            document.querySelectorAll('.pm-dot').forEach((d, j) => d.classList.toggle('active', j === pmSlide));
        }

        function addToCart(id, name, price) {
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(c => c.id !== id);
            updateCartUI();
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((s, c) => s + c.qty, 0);
            const total = cart.reduce((s, c) => s + c.price * c.qty, 0);

            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = formatPrice(total);
            document.getElementById('cartTotalModal').textContent = formatPrice(total);
            document.getElementById('cartFloat').classList.toggle('hidden', count === 0);

            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="empty">Giỏ hàng trống</p>';
            } else {
                cartItems.innerHTML = cart.map(c => `
                    <div class="cart-item">
                        <span class="cart-item-name">${c.name}</span>
                        <div class="cart-item-controls">
                            <button onclick="changeQty('${c.id}', -1)">−</button>
                            <span>${c.qty}</span>
                            <button onclick="changeQty('${c.id}', 1)">+</button>
                        </div>
                        <span class="cart-item-price">${formatPrice(c.price * c.qty)}</span>
                        <button class="btn-remove" onclick="removeFromCart('${c.id}')">&times;</button>
                    </div>
                `).join('');
            }
        }

        function openCart() {
            document.getElementById('cartModal').classList.remove('hidden');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.add('hidden');
        }

        async function submitOrder(e) {
            e.preventDefault();
            if (cart.length === 0) return alert('Giỏ hàng trống!');

            const order = {
                customer: document.getElementById('customerName').value.trim(),
                phone: document.getElementById('customerPhone').value.trim(),
                note: document.getElementById('customerNote').value.trim(),
                items: cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty })),
                total: cart.reduce((s, c) => s + c.price * c.qty, 0),
                status: 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection('orders').add(order);
            await db.collection('notifications').add({
                type: 'new_order',
                message: `Đơn mới từ ${order.customer} - ${formatPrice(order.total)}`,
                read: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            cart = [];
            updateCartUI();
            closeCart();
            document.getElementById('orderForm').reset();
            alert('Đặt hàng thành công! Cảm ơn bạn 🎉');
        }

        function formatPrice(n) {
            return n.toLocaleString('vi-VN') + 'đ';
        }

        loadMenu();
    </script>
</body>
</html>
